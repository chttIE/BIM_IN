title: "Заполнить\nпараметры МССК"
tooltip: |-
  Заполняет параметр RUS_MSSK_Element_Name по коду из RUS_MSSK_Element_Code.

  Правила работы:
  - Если выбраны элементы, обрабатывает только выбранные элементы.
  - Если выбора нет, ищет все элементы проекта с параметром RUS_MSSK_Element_Code.
  - Код читается из RUS_MSSK_Element_Code у экземпляра или типоразмера.
  - Наименование записывается в RUS_MSSK_Element_Name у экземпляра или типоразмера.
  - Соответствие кода и наименования берется из файла "Классификатор МССК_v5.txt" рядом со script.py.
  - Код 999 считается специальным: элемент не классифицируется, запись не выполняется и это не считается ошибкой.
  - Пустой код пропускается.
  - Код, которого нет в классификаторе, попадает в отчет "Коды не найдены".
  - Если значение уже записано, элемент считается уже заполненным и повторная запись не выполняется.
  - Если включена совместная работа, перед записью проверяется занятость элемента.
  - Элементы, занятые другим пользователем, пропускаются и попадают в отчет "Ошибки записи" с именем владельца, если Revit его возвращает.
author: IliaNistratov
