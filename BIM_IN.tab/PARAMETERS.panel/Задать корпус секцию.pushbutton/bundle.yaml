title: "Задать\nкорпус/секцию"
tooltip: |-
  Записывает ADSK_Номер корпуса и ADSK_Номер секции вручную введенными значениями.

  Правила работы:
  - Если выбраны элементы, обрабатывает только выбранные элементы.
  - Если выбора нет, ищет все элементы проекта с параметром RUS_MSSK_Element_Code.
  - Параметр RUS_MSSK_Element_Code ищется у экземпляра или типоразмера, как в кнопке заполнения параметров МССК.
  - ADSK_Номер корпуса и ADSK_Номер секции записываются у экземпляра или типоразмера.
  - Для типоразмеров повторная запись одного и того же параметра пропускается.
  - Если включена совместная работа, перед записью проверяется занятость элемента.
  - Элементы, занятые другим пользователем, пропускаются и попадают в отчет.
author: IliaNistratov
